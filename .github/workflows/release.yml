name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0) or "edge" for an artifact-only build'
        required: true
        default: 'edge'
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Pre-release gate: full integration tests via the project's existing
  # comprehensive-test workflow (also run on PR). Skipped for edge dispatches
  # because edge builds produce an artifact only — no GitHub release, nothing
  # to gate.
  pre-release:
    if: ${{ github.event_name == 'push' || inputs.version != 'edge' }}
    uses: ./.github/workflows/comprehensive-test.yml
    secrets: inherit

  release:
    needs: pre-release
    # Run when pre-release succeeded OR was skipped (edge build).
    if: ${{ !cancelled() && (needs.pre-release.result == 'success' || needs.pre-release.result == 'skipped') }}
    uses: oszuidwest/.github-templates/.github/workflows/go-release.yml@v1
    with:
      project-name: zwfm-aerontoolbox
      ldflags-target: main
      build-matrix: '[{"os":"linux","arch":"amd64"},{"os":"linux","arch":"arm64"},{"os":"linux","arch":"arm","arm":"7"},{"os":"darwin","arch":"amd64"},{"os":"darwin","arch":"arm64"}]'
      version: ${{ inputs.version }}
      enable-docker: true
    permissions:
      contents: write
      packages: write
