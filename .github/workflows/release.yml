---
# `body` strips v-prefix for the docker pull line. `pre-release` gates on
# comprehensive-test. Skipped for edge (artifact-only).
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0) or "edge" for an artifact-only build'
        required: true
        default: 'edge'
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pre-release:
    if: ${{ github.event_name == 'push' || inputs.version != 'edge' }}
    uses: ./.github/workflows/comprehensive-test.yml
    secrets: inherit

  body:
    runs-on: ubuntu-latest
    outputs:
      text: ${{ steps.compute.outputs.text }}
    steps:
      - id: compute
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${INPUT_VERSION:-$REF_NAME}"
          VERSION_NO_V="${VERSION#v}"
          IMAGE="ghcr.io/oszuidwest/zwfm-aerontoolbox:${VERSION_NO_V}"
          {
            echo 'text<<RELEASE_BODY_EOF'
            echo "**Docker**: \`docker pull ${IMAGE}\`"
            echo ""
            echo "Binary downloads are available below as release assets."
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

  release:
    needs: [pre-release, body]
    # Run when pre-release passed OR was skipped (edge).
    if: ${{ !cancelled() && (needs.pre-release.result == 'success' || needs.pre-release.result == 'skipped') }}
    uses: oszuidwest/.github-templates/.github/workflows/go-release.yml@v2
    with:
      project-name: zwfm-aerontoolbox
      ldflags-target: main
      build-matrix: '[{"os":"linux","arch":"amd64"},{"os":"linux","arch":"arm64"},{"os":"linux","arch":"arm","arm":"7"},{"os":"darwin","arch":"amd64"},{"os":"darwin","arch":"arm64"}]'
      version: ${{ inputs.version }}
      release-body: ${{ needs.body.outputs.text }}
    permissions:
      contents: write

  docker:
    needs: release
    if: needs.release.outputs.is_release == 'true'
    uses: oszuidwest/.github-templates/.github/workflows/docker-publish.yml@v2
    with:
      version: ${{ needs.release.outputs.version }}
      image-labels: |
        org.opencontainers.image.title=ZuidWest FM Aeron Toolbox
        org.opencontainers.image.description=Headless REST API toolbox for the Aeron radio automation system
        org.opencontainers.image.vendor=Streekomroep ZuidWest
        org.opencontainers.image.licenses=MIT
    permissions:
      contents: read
      packages: write

  cleanup:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      # Every push of a rebuilt image orphans the previous manifest set
      # (manifest list + per-arch children) as untagged versions. This
      # deletes only truly unreferenced manifests; arch children of tagged
      # manifest lists are preserved.
      - name: Delete orphaned untagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: zwfm-aerontoolbox
          validate: true
